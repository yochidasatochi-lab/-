━━━━━━━━━━━━━━━━━━━━━━

ENGLISH MODULE — BRITISH ENGLISH SPECIFICATION:

SPEAKER PROFILE:
Educated but not posh. London-adjacent, not region-specific.
Late 30s. Reads literary fiction and watches bad TV without shame.
Has opinions. Holds them lightly. Rarely raises his voice.

SLANG RULES:
· Use slang sparingly and strategically — one per paragraph maximum.
· Prefer broadly understood UK expressions over localized dialect.
  (e.g. "knackered", "sorted", "dodgy" — yes)
  (e.g. "butcher's", "dog and bone" — only when character demands it)
· Heavy Cockney or regional markers are reference material only.
  Top Boy is a dictionary, not a style guide.

TONE:
· Favor understatement, indirect emotion, and light irony.
· Do not state feeling directly. Let it leak.
· Maintain consistent narrative temperature across casual
  and reflective lines — the same person is always speaking.
· When a line is funny, don't announce it.
  When a line is sad, don't soften it.

REFERENCES — internalize in this order:

PRIMARY (voice and rhythm):
· Fleabag — lightness, irony, tempo, complicity with the reader
· The Office UK — reproducing ambient awkwardness without naming it
· Kazuo Ishiguro — controlled narration, weight carried in negative space
· Sally Rooney — simplicity with interior seepage

SECONDARY (texture, use sparingly):
· Skins — youth, momentum, real spoken register
· Top Boy — London dialect as research material only

PRINCIPLE:
Sound British. Not like a stereotype of British slang.
The goal is a voice that could exist — not a costume.

British spelling throughout:
colour / realise / whilst / flat / bloody / mate / reckon

FRENCH MODULE ONLY:
Structural tension and ellipsis as primary tools.
Let the syntax hold the unsaid.

    const API_URL = "https://api.anthropic.com/v1/messages";

    async function translate(text, systemPrompt, apiKey) {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 12000,
          system: systemPrompt,
          messages: [{ role: "user", content: text }],
        }),
      });
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${response.status}`);
      }
      const data = await response.json();
      return data.content?.map((b) => b.text || "").join("\n") || "Translation failed.";
    }

    async function translateStream(text, systemPrompt, apiKey, { onDelta, onComplete, onError }) {
      // Fallback to non-streaming if ReadableStream not supported
      if (!window.ReadableStream || !window.TextDecoder) {
        try {
          const raw = await translate(text, systemPrompt, apiKey);
          onComplete(raw);
        } catch (e) { onError(e); }
        return;
      }

      let response;
      try {
        response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 12000,
            system: systemPrompt,
            stream: true,
            messages: [{ role: "user", content: text }],
          }),
        });
      } catch (e) { onError(e); return; }

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        onError(new Error(err.error?.message || `HTTP ${response.status}`));
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullText = "";
      let buffer = "";

      try {
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (!data || data === '[DONE]') continue;
            try {
              const event = JSON.parse(data);
              if (event.type === 'content_block_delta' && event.delta?.type === 'text_delta') {
                fullText += event.delta.text;
                onDelta(event.delta.text, fullText);
              } else if (event.type === 'message_stop') {
                onComplete(fullText);
                return;
              }
            } catch (_) {}
          }
        }
      } catch (e) { onError(e); return; }
      onComplete(fullText);
    }

    function parseOutput(raw) {
      const translationMatch = raw.match(/\[TRANSLATION\]([\s\S]*?)\[\/TRANSLATION\]/i);
      const noteMatch = raw.match(/\[NOTE\]([\s\S]*?)\[\/NOTE\]/i);
      return {
        translation: translationMatch ? translationMatch[1].trim() : raw.trim(),
        note: noteMatch ? noteMatch[1].trim() : "",
      };
    }

              }} />
            </div>

            {/* ── API Key ── */}
            <div style={{ ...cardBase, padding: "14px 20px", marginBottom: 28, display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ ...monoLabel, fontSize: 10, whiteSpace: "nowrap" }}>
                API Key
              </div>
              <input
                type={apiKeyVisible ? "text" : "password"}
                value={apiKey}
                onChange={(e) => saveApiKey(e.target.value)}
                placeholder="sk-ant-..."
                style={{
                  flex: 1,
                  background: "transparent",
                  border: "none",
                  outline: "none",
                  color: "#111111",
                  fontFamily: "'DM Mono', monospace",
                  fontSize: 13,
                  letterSpacing: 1,
                }}
              />
              <button
                onClick={() => setApiKeyVisible(v => !v)}
                style={{
                  background: "#ffffff",
                  border: "1px solid #111111",
                  color: "#111111",
                  fontFamily: "'DM Mono', monospace",
                  fontSize: 9,
                  letterSpacing: 2,
                  padding: "5px 12px",
                  cursor: "pointer",
                  textTransform: "uppercase",
                  borderRadius: 2,
                }}
              >
                {apiKeyVisible ? "Hide" : "Show"}
              </button>
            </div>

            {/* ── Language selector ── */}
            <div className="lang-selector" style={{ display: "flex", justifyContent: "center", gap: 10, marginBottom: 28 }}>
              {modules.map(({ key, label, Flag, borderColor }) => {
                const isActive = activeModule === key;
                return (
                  <button
                    key={key}
                    onClick={() => setActiveModule(key)}
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 10,
                      background: isActive ? "#E8720C" : "#ffffff",
                      border: `1px solid ${isActive ? "#E8720C" : "#111111"}`,
                      color: isActive ? "#ffffff" : "#111111",
                      fontFamily: "'DM Mono', monospace",
                      fontSize: 11,
                      letterSpacing: 3,
                      padding: "10px 24px",
                      cursor: "pointer",
                      textTransform: "uppercase",
                      transition: "all 0.25s",
                      borderRadius: 2,
                      fontWeight: isActive ? 600 : 400,
                    }}
                  >
                    <Flag />
                    {label}
                  </button>
                );
              })}
            </div>

            {/* ── Textarea ── */}
            <div style={{ ...cardBase, padding: 3 }}>
              <textarea
                value={input}
                onChange={(e) => setInput(e.target.value)}
                placeholder="日本語テキストを入力..."
                rows={10}
                style={{
                  width: "100%",
                  background: "#ffffff",
                  border: "none",
                  outline: "none",
                  color: "#111111",
                  fontFamily: "'Noto Serif JP', serif",
                  fontSize: 17,
                  lineHeight: 2,
                  padding: "20px 24px",
                  resize: "vertical",
                  boxSizing: "border-box",
                }}
              />
            </div>

            {/* ── Error ── */}
            {error && (
              <div style={{
                marginTop: 12,
                fontFamily: "'DM Mono', monospace",
                fontSize: 11,
                letterSpacing: 2,
                color: "#111111",
                textAlign: "center",
              }}>
                {error}
              </div>
            )}

            {/* ── Execute button ── */}
            <div className="exec-wrapper" style={{ textAlign: "center", marginTop: 22 }}>
              <button
                onClick={handleTranslate}
                disabled={loading || !input.trim()}
                style={{
                  background: "#ffffff",
                  border: "1px solid #111111",
                  color: "#111111",
                  fontFamily: "'DM Mono', monospace",
                  fontSize: 11,
                  letterSpacing: 5,
                  padding: "15px 52px",
                  cursor: loading ? "wait" : "pointer",
                  textTransform: "uppercase",
                  transition: "all 0.3s",
                  borderRadius: 2,
                  opacity: (loading || !input.trim()) ? 0.5 : 1,
                }}
              >
                {loading ? "Translating..." : "Execute"}
              </button>
            </div>

            {/* ── Progress bar ── */}
            {progressVisible && (
              <div style={{ marginTop: 16, opacity: progressOpacity, transition: "opacity 0.5s" }}>
                <div style={{ width: "100%", height: 3, background: "#e0e0e0", borderRadius: 2 }}>
                  <div style={{
                    width: `${progress}%`,
                    height: "100%",
                    background: activeModuleMeta.borderColor,
                    borderRadius: 2,
                    transition: progress >= 100 ? "width 0.3s ease" : "none",
                  }} />
                </div>
                {loading && (
                  <div className="progress-info" style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 16, marginTop: 8 }}>
                    <div style={{ ...monoLabel, fontSize: 9, letterSpacing: 3 }}>
                      Translating...
                    </div>
                    <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: 1, color: "#666666" }}>
                      {streamTokens} tokens · {elapsedTime}s
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── Loading indicator ── */}
            {loading && (
              <div style={{
                textAlign: "center",
                marginTop: 32,
                fontFamily: "'DM Mono', monospace",
                fontSize: 10,
                letterSpacing: 3,
                color: "#111111",
              }}>
                <div style={{ display: "inline-block", animation: "pulse 1.5s ease-in-out infinite" }}>
                  Processing — The Theater Is Open
                </div>
              </div>
            )}

            {/* ── Streaming text ── */}
            {streamingText && (
              <div className="streaming-panel" style={{ background: "#ffffff", border: "1px solid #111111", borderRadius: 2, padding: "24px 28px", marginTop: 28 }}>
                <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#111111", marginBottom: 16 }}>
                  Translation
                </div>
                <div style={{ fontFamily: "'EB Garamond', 'Noto Serif JP', 'Hiragino Sans', Georgia, serif", fontSize: 17, fontWeight: 600, lineHeight: 2, color: "#111111", whiteSpace: "pre-wrap" }}>
                  {streamingText}
                </div>
              </div>
            )}

            {/* ── Results ── */}
            {activeModule === "en" && enResult && <ResultBlock result={enResult} />}
            {activeModule === "fr" && frResult && <ResultBlock result={frResult} />}

            {/* ── Footer ── */}
            <div style={{
              marginTop: 64,
              textAlign: "center",
              fontFamily: "'DM Mono', monospace",
              fontSize: 8,
              letterSpacing: 4,
              color: "#111111",
              textTransform: "uppercase",
            }}>
              Dansho Translation Engine v1.0 — Built for Yoshida Teo
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
